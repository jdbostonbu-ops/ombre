<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Stone background -->
  <rect width="512" height="512" rx="96" fill="#F2EFE8"/>

  <!-- The italic Ó wordmark — the brand mark itself.
       Cormorant Garamond serif. Sized large, centered. -->
  <text x="256" y="370"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic"
        font-weight="400"
        font-size="380"
        text-anchor="middle"
        fill="#1F1D18"
        letter-spacing="-12">Ó</text>

  <!-- Tiny subscript dot — vermillion accent, signals the active-state color -->
  <circle cx="380" cy="400" r="8" fill="#8C2818"/>
</svg>
